<p class="mt0">
  The point is not the graph, but the fact that it is a completely normal
  <code>svg</code> element, with no charting libraries or any kind of special
  rendering needed.
</p>

<input
  type="hidden"
  name="chartWidth"
  link:value="referenceChartWidth"
  on:attr:value="sendChartWidth"
  on="sendChartWidth"
  debounce="100"
  src="/reference-chart"
  result="referenceChart"
>

<svg
  class="chart"
  height="500"
  ref:width="referenceChartWidth"
  measure="devicePixelContentBoxSize"
  render="referenceChart"
  position="replaceWith"
></svg>
