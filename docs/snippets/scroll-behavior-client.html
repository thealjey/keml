<button
  type="button"
  class="btn mb3"
  on:click="scrollBehavior"
>
  scroll down
</button>

<div
  class="overflow-y-auto h4"
  scroll="scrollBehavior"
  behavior="smooth"
  top="500"
>
  <div class="h5 bg-red"></div>
  <div class="h5 bg-green"></div>
  <div class="h5 bg-blue"></div>
  <div class="h5 bg-yellow"></div>
</div>
