<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta on="pushHome" redirect="pushState" src="{url('home')}">
    <meta on="replaceHome" redirect="replaceState" src="{url('home')}">
    <meta on="pushCreate" redirect="pushState" src="{url('create')}">
    <meta on="pushSettings" redirect="pushState" src="{url('settings')}">
    <meta on="replaceSettings" redirect="replaceState" src="{url('settings')}">
    <meta on="pushLogin" redirect="pushState" src="{url('login')}">
    <meta on="pushRegister" redirect="pushState" src="{url('register')}">
    <meta on="pushFeed" redirect="pushState" src="{url('feed')}">
    <title>Conduit</title>
    <link
      href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css?family=Titillium+Web:700|Source+Serif+Pro:400,700|Merriweather+Sans:400,700|Source+Sans+Pro:400,300,600,700,300italic,400italic,600italic,700italic"
      rel="stylesheet"
    >
    <link href="https://demo.productionready.io/main.css" rel="stylesheet">
    <link
      href="https://unpkg.com/tachyons@4.12.0/css/tachyons.css"
      rel="stylesheet"
    >
    <script src="{url('js')}"></script>
  </head>
  <body>
    <main
      error="content"
      on="refreshContent"
      on:navigate="refreshContent"
      render="content"
      result="content"
    >
      <include tpl="content">
    </main>
    <footer>
      <div class="container">
        <a class="logo-font" href="{url('home')}" on:click="pushHome">
          conduit
        </a>
        <span class="attribution">
          An interactive learning project from 
          <a href="https://thinkster.io" target="_blank">Thinkster</a>
          . Code & design licensed under MIT.
        </span>
      </div>
    </footer>
  </body>
</html>
