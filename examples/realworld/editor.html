<div class="editor-page">
  <div class="container page">
    <div class="row">
      <div class="col-md-10 col-xs-12 offset-md-1">
        <ul class="error-messages">
          <li class="dn" if="titleInvalid" x-class>Please enter a title</li>
          <li class="dn" if="longInvalid" x-class>
            Please enter the article text
          </li>
          <li class="dn" if="tagsInvalid" x-class>
            Please enter at least one tag (comma separated)
          </li>
          <div render="submitErrors"></div>
        </ul>
        <include tpl="editorForm">
      </div>
    </div>
  </div>
</div>
