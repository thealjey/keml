<div class="card" position="replaceWith" render="deletedComment-{comment_id}">
  <div class="card-block">{markdown(comment_text)}</div>
  <div class="card-footer">
    <a
      class="comment-author"
      href="{url('profile', slug=commenter.user_slug)}"
      on="redirect-{increment()}"
      on:click="redirect-{increment(True)}"
      redirect="pushState"
    >
      <img class="comment-author-img" src="{commenter.avatar}">
    </a>
    <a
      class="comment-author"
      href="{url('profile', slug=commenter.user_slug)}"
      on="redirect-{increment()}"
      on:click="redirect-{increment(True)}"
      redirect="pushState"
    >{commenter.username}</a>
    <span class="date-posted">{ftime(comment_ctime)}</span>
    <yes condition="{user and user.user_id == commenter.user_id}">
      <span class="mod-options">
        <i
          class="ion-trash-a"
          delete="{url('comment', id=comment_id)}"
          on="remove-comment-{comment_id}"
          on:click="remove-comment-{comment_id}"
          result="deletedComment-{comment_id}"
        ></i>
      </span>
    </yes>
  </div>
</div>
