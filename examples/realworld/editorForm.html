<form
  error="submitErrors"
  if:invalid="formInvalid"
  method="post"
  on="createArticle"
  on:result="redirect-{increment(True)}"
  on:submit="createArticle"
  position="replaceWith"
  render="updatedForm"
  result="updatedForm"
>
  <fieldset
    on="redirect-{increment()}"
    redirect="replaceState"
    src="{url('article', slug=article_slug)}"
  >
    <fieldset class="form-group">
      <input
        class="form-control form-control-lg"
        if:invalid="titleInvalid"
        name="article_title"
        placeholder="Article Title"
        required
        type="text"
        value="{article_title}"
      >
    </fieldset>
    <fieldset class="form-group">
      <input
        class="form-control"
        name="short"
        placeholder="What's this article about?"
        title="Leaving this field blank will default it to a truncated version of the main article text."
        type="text"
        value="{short}"
      >
    </fieldset>
    <fieldset class="form-group">
      <textarea
        class="form-control"
        if:invalid="longInvalid"
        name="long"
        placeholder="Write your article (in markdown)"
        required
        rows="8"
      >{long}</textarea>
    </fieldset>
    <fieldset class="form-group" render="articleTags">
      <include tpl="articleTags">
    </fieldset>
    <button
      class="btn btn-lg btn-primary pull-xs-right"
      if="formInvalid"
      x-disabled
    >
      <yes condition="article_slug">Save Article</yes>
      <no condition="article_slug">Publish Article</no>
    </button>
  </fieldset>
</form>
