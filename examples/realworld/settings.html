<div class="settings-page">
  <div class="container page">
    <div class="row">
      <div class="col-md-6 col-xs-12 offset-md-3">
        <h1 class="text-xs-center">Your Settings</h1>
        <ul class="error-messages">
          <li class="dn" if="urlInvalid" x-class>Please enter a valid url</li>
          <li class="dn" if="emailInvalid" x-class>
            Please enter a valid email
          </li>
          <li class="dn" if="passwordInvalid" x-class>
            Please enter a password longer than 4 characters
          </li>
          <div render="submitErrors"></div>
        </ul>
        <include tpl="settingsForm">
        <hr>
        <button
          class="btn btn-outline-danger"
          delete="{url('login')}"
          on="logout"
          on:click="logout"
          on:result="pushHome"
        >Or click here to logout.</button>
      </div>
    </div>
  </div>
</div>
