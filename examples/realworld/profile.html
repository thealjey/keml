<div class="profile-page">
  <div class="user-info">
    <div class="container">
      <div class="row">
        <div class="col-md-10 col-xs-12 offset-md-1">
          <img class="user-img" src="{author.avatar}">
          <h4>{author.username}</h4>
          <div>{markdown(author.bio)}</div>
          <yes condition="{user and user.user_id != author.user_id}">
            <include tpl="followRequest">
            <span class="fr ml2" render="followButton-{author.user_id}">
              <include tpl="followButton">
            </span>
          </yes>
          <yes condition="{user and user.user_id == author.user_id}">
            <a
              class="action-btn btn btn-outline-secondary btn-sm"
              href="{url('settings')}"
              on:click="replaceSettings"
            >
              <i class="ion-gear-a"></i>
              Edit Profile Settings
            </a>
          </yes>
        </div>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-md-10 col-xs-12 offset-md-1">
        <div class="articles-toggle">
          <ul class="nav nav-pills outline-active">
            <li class="nav-item">
              <yes condition="{active_route in ['profile', 'profile_pages']}">
                <a class="active nav-link" inert>My Articles</a>
              </yes>
              <no condition="{active_route in ['profile', 'profile_pages']}">
                <a
                  class="nav-link"
                  href="{url('profile', slug=author.user_slug)}"
                  on="redirect-{increment(1)}"
                  on:click="redirect-{increment()}"
                  redirect="pushState"
                >My Articles</a>
              </no>
            </li>
            <li class="nav-item">
              <yes
                condition="{active_route in ['favorites', 'favorites_pages']}"
              >
                <a class="active nav-link" inert>Favorited Articles</a>
              </yes>
              <no
                condition="{active_route in ['favorites', 'favorites_pages']}"
              >
                <a
                  class="nav-link"
                  href="{url('favorites', slug=author.user_slug)}"
                  on="redirect-{increment(1)}"
                  on:click="redirect-{increment()}"
                  redirect="pushState"
                >Favorited Articles</a>
              </no>
            </li>
          </ul>
        </div>
        <yes condition="{active_route in ['profile', 'profile_pages']}">
          <include
            articles="{author_articles}"
            params="{{'slug': author.user_slug}}"
            route="profile"
            total="{author_article_count}"
            tpl="articles"
          >
          <no condition="author_article_count">
            <h2 class="mt4">Nothing to show here yet.</h2>
            <p>Post your first article, to see it here.</p>
          </no>
        </yes>
        <yes condition="{active_route in ['favorites', 'favorites_pages']}">
          <include
            articles="{liked_articles}"
            params="{{'slug': author.user_slug}}"
            route="favorites"
            total="{liked_article_count}"
            tpl="articles"
          >
          <no condition="liked_article_count">
            <h2 class="mt4">Nothing to show here yet.</h2>
            <p>Add some articles to favorites, to see them here.</p>
          </no>
        </yes>
      </div>
    </div>
  </div>
</div>
