<button
  class="btn btn-sm btn{'' if is_liked else '-outline'}-primary"
  on:click="{'un' if is_liked else ''}likeArticle-{article_id}"
>
  <i class="ion-heart"></i>
  <yes condition="{label == 'b'}">Favorite Article ({total_likes})</yes>
  <no condition="{label == 'b'}">{total_likes}</no>
</button>
