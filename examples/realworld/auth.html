<div class="auth-page">
  <div class="container page">
    <div class="row">
      <div class="col-md-6 col-xs-12 offset-md-3">
        <h1 class="text-xs-center">
          <yes condition="{active_route == 'login'}">Sign in</yes>
          <yes condition="{active_route == 'register'}">Sign up</yes>
        </h1>
        <p class="text-xs-center">
          <a
            href="{url('register' if active_route == 'login' else 'login')}"
            on="pushAuth"
            on:click="pushAuth"
            redirect="pushState"
          >
            <yes condition="{active_route == 'login'}">Need an account?</yes>
            <yes condition="{active_route == 'register'}">Have an account?</yes>
          </a>
        </p>
        <ul class="error-messages">
          <li class="dn" if="usernameInvalid" x-class>
            Please enter a username
          </li>
          <li class="dn" if="emailInvalid" x-class>
            Please enter a valid email
          </li>
          <li class="dn" if="passwordInvalid" x-class>
            Please enter a password longer than 4 characters
          </li>
          <div render="submitErrors"></div>
        </ul>
        <form
          action="{url(active_route)}"
          error="submitErrors"
          if:invalid="formInvalid"
          method="post"
          on="submitAuth"
          on:navigate="resetAuthForm"
          on:result="pushHome"
          on:submit="submitAuth"
          reset="resetAuthForm"
        >
          <yes condition="{active_route == 'register'}">
            <fieldset class="form-group">
              <input
                autocomplete="username"
                class="form-control form-control-lg"
                if:invalid="usernameInvalid"
                name="username"
                placeholder="Username"
                required
                type="text"
              >
            </fieldset>
          </yes>
          <fieldset class="form-group">
            <input
              autocomplete="email"
              class="form-control form-control-lg"
              if:invalid="emailInvalid"
              name="email"
              placeholder="Email"
              required
              type="email"
            >
          </fieldset>
          <fieldset class="form-group">
            <input
              autocomplete="{'current-password' if active_route == 'login' else 'new-password' if active_route == 'register' else None}"
              class="form-control form-control-lg"
              if:invalid="passwordInvalid"
              minlength="5"
              name="password"
              placeholder="Password"
              required
              type="password"
            >
          </fieldset>
          <button
            class="btn btn-lg btn-primary pull-xs-right"
            if="formInvalid"
            x-disabled
          >
            <yes condition="{active_route == 'login'}">Sign in</yes>
            <yes condition="{active_route == 'register'}">Sign up</yes>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
