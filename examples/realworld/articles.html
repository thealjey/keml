<for collection="articles">
  <div class="article-preview">
    <div class="article-meta">
      <include tpl="info">
      <yes condition="{user and author.user_id != user.user_id}">
        <include label="a" tpl="likeRequest">
        <span class="pull-xs-right" render="likeButton-{article_id}">
          <include label="a" tpl="likeButton">
        </span>
      </yes>
    </div>
    <a
      class="preview-link"
      href="{url('article', slug=article_slug)}"
      on="redirect-{increment()}"
      on:click="redirect-{increment(True)}"
      redirect="pushState"
    >
      <h1>{article_title}</h1>
      <p>{short}</p>
      <span>Read more...</span>
      <ul class="tag-list">
        <for collection="tags">
          <li class="tag-default tag-outline tag-pill">{item}</li>
        </for>
      </ul>
    </a>
  </div>
</for>
<yes condition="{total / 10 > 1}">
  <ul class="pagination">
    <for collection="{list(range(1, ceil(total / 10) + 1))}">
      <yes condition="{page == item}">
        <li class="active page-item">
          <a class="page-link" inert>{item}</a>
        </li>
      </yes>
      <no condition="{page == item}">
        <li class="page-item">
          <a
            class="page-link"
            href="{url(route, **params) if item == 1 else url(f'{route}_pages', page=item, **params)}"
            on="redirect-{increment()}"
            on:click="redirect-{increment(True)}"
            redirect="pushState"
          >{item}</a>
        </li>
      </no>
    </for>
  </ul>
</yes>
