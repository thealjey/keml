<input
  class="form-control"
  debounce="1000"
  if:invalid="tagsInvalid"
  name="tags"
  on="tagChange"
  on:input="tagChange"
  on:result
  placeholder="Enter tags"
  post="{url('split_chips')}"
  required
  result="tagChips"
  title="Comma separated list."
  type="text"
  value="{', '.join(tags)}"
>
<div class="tag-list" render="tagChips">
  <include tpl="chips">
</div>
