<a
  href="{url('profile', slug=author.user_slug)}"
  on="redirect-{increment(1)}"
  on:click="redirect-{increment()}"
  redirect="pushState"
>
  <img src="{author.avatar}">
</a>
<div class="info">
  <a
    class="author"
    href="{url('profile', slug=author.user_slug)}"
    on="redirect-{increment(1)}"
    on:click="redirect-{increment()}"
    redirect="pushState"
  >{author.username}</a>
  <span class="date">{ftime(article_mtime)}</span>
</div>
