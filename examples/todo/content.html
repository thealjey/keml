<yes condition="{len(todos)}">
  <main class="main">
    <div class="toggle-all-container">
      <input
        checked="{len(todos) == len(completedTodos)}"
        class="toggle-all"
        id="toggle-all"
        name="completed"
        on="toggleAll"
        on:change="toggleAll"
        on:result="updateTodos"
        put="{url('home')}"
        type="checkbox"
      >
      <yes condition="{active_route == 'home'}">
        <label
          class="toggle-all-label{'' if len(todos) else ' o-0'}"
          for="toggle-all"
        >Mark all as complete</label>
      </yes>
      <yes condition="{active_route == 'active'}">
        <label
          class="toggle-all-label{'' if len(activeTodos) else ' o-0'}"
          for="toggle-all"
        >Mark all as complete</label>
      </yes>
      <yes condition="{active_route == 'completed'}">
        <label
          class="toggle-all-label{'' if len(completedTodos) else ' o-0'}"
          for="toggle-all"
        >Mark all as complete</label>
      </yes>
    </div>
    <ul class="todo-list">
      <yes condition="{active_route == 'home'}">
        <for collection="todos">
          <include state="view" tpl="item">
        </for>
      </yes>
      <yes condition="{active_route == 'active'}">
        <for collection="activeTodos">
          <include state="view" tpl="item">
        </for>
      </yes>
      <yes condition="{active_route == 'completed'}">
        <for collection="completedTodos">
          <include state="view" tpl="item">
        </for>
      </yes>
    </ul>
  </main>
  <footer class="footer h2">
    <span class="todo-count">
      {len(activeTodos)} {"item" if len(activeTodos) == 1 else "items"} left
    </span>
    <ul class="filters">
      <li>
        <a
          class="{'selected' if active_route == 'home' else None}"
          href="{url('home')}"
          on="filter-all"
          on:click="filter-all"
          redirect="pushState"
        >All</a>
      </li>
      <li>
        <a
          class="{'selected' if active_route == 'active' else None}"
          href="{url('active')}"
          on="filter-active"
          on:click="filter-active"
          redirect="pushState"
        >Active</a>
      </li>
      <li>
        <a
          class="{'selected' if active_route == 'completed' else None}"
          href="{url('completed')}"
          on="filter-completed"
          on:click="filter-completed"
          redirect="pushState"
        >Completed</a>
      </li>
    </ul>
    <button
      class="clear-completed"
      delete="{url('home')}"
      on="clearCompleted"
      on:click="clearCompleted"
      on:result="updateTodos"
    >Clear completed</button>
  </footer>
</yes>
