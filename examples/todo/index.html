<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta content="A TodoMVC written with the KEML library." name="description">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TodoMVC: KEML</title>
    <link href="data:" rel="icon">
    <link
      href="https://unpkg.com/todomvc-app-css@2.4.3/index.css"
      rel="stylesheet"
    >
    <link
      href="https://unpkg.com/tachyons@4.12.0/css/tachyons.css"
      rel="stylesheet"
    >
    <script src="{url('js')}"></script>
  </head>
  <body class="center">
    <section class="todoapp">
      <header class="header">
        <h1>todos</h1>
        <form
          action="{url('home')}"
          method="post"
          on="addTodo"
          on:result="updateTodos"
          on:submit="addTodo resetForm"
          reset="resetForm"
        >
          <input
            autofocus
            class="new-todo"
            name="todo"
            placeholder="What needs to be done?"
            required
          >
        </form>
      </header>
      <div
        on="updateTodos"
        on:navigate="updateTodos"
        render="content"
        result="content"
      >
        <include tpl="content">
      </div>
    </section>
    <footer class="info pb1">
      <p>Double-click to edit a todo</p>
      <p>
        Inspired by and uses the stylesheets from 
        <a href="http://todomvc.com" target="_blank">TodoMVC</a>
      </p>
    </footer>
  </body>
</html>
