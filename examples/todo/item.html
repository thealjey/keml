<li
  class="{'completed' if completed else ''} {'editing' if state == 'edit' else ''}"
  get="{url('todo', id=id, state='edit' if state == 'view' else 'view')}"
  on="{'edit' if state == 'view' else 'view'}-{id}"
  position="replaceWith"
  render="todoResult-{id}"
  result="todoResult-{id}"
>
  <div class="view">
    <input
      checked="{completed}"
      class="toggle"
      name="completed"
      on="toggleCompleted-{id}"
      on:change="toggleCompleted-{id}"
      on:result="updateTodos"
      put="{url('todo', id=id)}"
      type="checkbox"
    >
    <label on:dblclick="edit-{id}" render="rename-{id}">{title}</label>
    <button
      class="destroy"
      delete="{url('todo', id=id)}"
      on="remove-{id}"
      on:click="remove-{id}"
      on:result="updateTodos"
    ></button>
  </div>
  <yes condition="{state == 'edit'}">
    <form
      action="{url('todo', id=id)}"
      class="input-container"
      method="post"
      on="rename-{id}"
      on:result="view-{id}"
      on:submit="rename-{id}"
      result="rename-{id}"
    >
      <input
        autofocus
        class="edit"
        event:keyup="code=Escape"
        id="edit-todo-input"
        name="todo"
        on:blur="view-{id}"
        on:keyup="view-{id}"
        required
        value="{title}"
      >
    </form>
  </yes>
</li>
